<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Farmacia MM</title>
    <link rel="stylesheet" href="../public/css/styles.css">
    <link rel="stylesheet" href="../public/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>Farmacia MM</h1>
            <p class="subtitle">Sistema de Gestión de Medicamentos</p>

            <form id="loginForm" class="form-login">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="tu@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Ingresa tu contraseña"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
            </form>

            <div class="form-footer">
                <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
            </div>

            <div id="messageContainer" class="message-container"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../src/models/User.js"></script>
    <script src="../src/controllers/AuthController.js"></script>
    <script src="../src/utils/localStorage.js"></script>
    <script src="../src/utils/validaciones.js"></script>
    <script src="../public/js/login.js"></script>
</body>
</html>
