<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicamentos - Farmacia MM</title>
    <link rel="stylesheet" href="../public/css/styles.css">
    <link rel="stylesheet" href="../public/css/medicamentos.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">Farmacia MM</h1>
            <ul class="nav-menu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="medicamentos.html" class="active">Medicamentos</a></li>
                <li><a href="registroMedicamento.html">Agregar Medicamento</a></li>
                <li><a href="#" id="logoutBtn">Cerrar Sesión</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <section class="medicamentos-section">
            <h2>Gestión de Medicamentos</h2>

            <div class="search-bar">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Buscar medicamento..."
                    autocomplete="off"
                >
                <button id="searchBtn" class="btn btn-secondary">Buscar</button>
            </div>

            <div id="filterContainer" class="filter-container">
                <label for="categoryFilter">Filtrar por categoría:</label>
                <select id="categoryFilter">
                    <option value="">Todas las categorías</option>
                    <option value="Analgésicos">Analgésicos</option>
                    <option value="Antiinflamatorios">Antiinflamatorios</option>
                    <option value="Antibióticos">Antibióticos</option>
                    <option value="Vitaminas">Vitaminas</option>
                </select>
            </div>

            <div id="medicamentosContainer" class="medicamentos-grid">
                <!-- Los medicamentos se cargarán aquí dinámicamente -->
            </div>
        </section>
    </div>

    <!-- Modal para ver detalles -->
    <div id="detalleModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle"></h2>
            <p id="modalDescription"></p>
            <p><strong>Precio:</strong> $<span id="modalPrice"></span></p>
            <p><strong>Stock:</strong> <span id="modalStock"></span></p>
            <p><strong>Categoría:</strong> <span id="modalCategory"></span></p>
            <div class="modal-actions">
                <button id="editBtn" class="btn btn-primary">Editar</button>
                <button id="deleteBtn" class="btn btn-danger">Eliminar</button>
                <button id="closeModalBtn" class="btn btn-secondary">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../src/models/Medicamento.js"></script>
    <script src="../src/controllers/AuthController.js"></script>
    <script src="../src/controllers/MedicamentoController.js"></script>
    <script src="../src/utils/localStorage.js"></script>
    <script src="../src/utils/validaciones.js"></script>
    <script src="../public/js/medicamentos.js"></script>
</body>
</html>
