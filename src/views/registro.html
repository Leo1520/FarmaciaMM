<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Farmacia MM</title>
    <link rel="stylesheet" href="../public/css/styles.css">
    <link rel="stylesheet" href="../public/css/registro.css">
</head>
<body>
    <div class="registro-container">
        <div class="registro-card">
            <h1>Crear Cuenta</h1>
            <p class="subtitle">Regístrate en Farmacia MM</p>

            <form id="registroForm" class="form-registro">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input 
                        type="text" 
                        id="nombre" 
                        name="nombre" 
                        placeholder="Tu nombre completo"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="tu@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Mínimo 6 caracteres"
                        required
                    >
                    <small>Mínimo 6 caracteres</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmar Contraseña</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="Confirma tu contraseña"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary">Registrarse</button>
            </form>

            <div class="form-footer">
                <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
            </div>

            <div id="messageContainer" class="message-container"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../src/models/User.js"></script>
    <script src="../src/controllers/AuthController.js"></script>
    <script src="../src/utils/localStorage.js"></script>
    <script src="../src/utils/validaciones.js"></script>
    <script src="../public/js/registro.js"></script>
</body>
</html>
